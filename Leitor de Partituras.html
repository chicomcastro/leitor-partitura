document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

osition: absolute; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 30;\">\n      <div onclick=\"{{ stop }}\" style=\"width: 420px; max-width: 100%; background: #161C2A; border: 1px solid #2C3447; border-radius: 18px; padding: 22px; max-height: 86vh; overflow-y: auto;\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;\">\n          <div style=\"font-size: 17px; font-weight: 700; color: #fff;\">Gravações<\u002Fdiv>\n          <button onclick=\"{{ toggleRecPanel }}\" style=\"background: transparent; border: none; color: #747E91; cursor: pointer; display: flex;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasRecordings }}\" hint-placeholder-val=\"{{ false }}\">\n          <sc-for list=\"{{ recordings }}\" as=\"rec\" hint-placeholder-count=\"0\">\n            <div style=\"display: flex; align-items: center; gap: 10px; padding: 11px 12px; background: #1E2636; border-radius: 11px; margin-bottom: 9px;\">\n              <button onclick=\"{{ rec.play }}\" style=\"{{ rec.playStyle }}\">\n                <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"{{ rec.playIcon }}\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n              <div style=\"flex: 1; min-width: 0;\">\n                <div style=\"font-size: 13px; font-weight: 600; color: #EEF1F8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ rec.name }}<\u002Fdiv>\n                <div style=\"font-size: 11px; color: #747E91; font-weight: 500;\">{{ rec.meta }}<\u002Fdiv>\n              <\u002Fdiv>\n              <button onclick=\"{{ rec.download }}\" style=\"background: transparent; border: none; color: #9CA5B8; cursor: pointer; display: flex; padding: 6px;\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n              <button onclick=\"{{ rec.del }}\" style=\"background: transparent; border: none; color: #747E91; cursor: pointer; display: flex; padding: 6px;\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noRecordings }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"text-align: center; padding: 30px 10px; color: #747E91; font-size: 13.5px; line-height: 1.5;\">Nenhuma gravação desta peça ainda.<br>Toque no microfone para gravar o ensaio.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== MODAL ===================== -->\n  <sc-if value=\"{{ showModal }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ closeModal }}\" style=\"position: absolute; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50;\">\n    <div onclick=\"{{ stop }}\" style=\"width: 380px; max-width: 100%; background: #161C2A; border: 1px solid #2C3447; border-radius: 18px; padding: 22px;\">\n      <div style=\"font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 16px;\">{{ modalTitle }}<\u002Fdiv>\n\n      <sc-if value=\"{{ mIsPlaylist }}\" hint-placeholder-val=\"{{ false }}\">\n        <input value=\"{{ modalText }}\" oninput=\"{{ onModalText }}\" placeholder=\"Nome da playlist\" style=\"width: 100%; background: #0F1422; border: 1px solid #2C3447; color: #EEF1F8; padding: 12px 14px; border-radius: 10px; font-size: 14px; font-family: 'Montserrat', sans-serif; outline: none;\">\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ mIsMarker }}\" hint-placeholder-val=\"{{ false }}\">\n        <input value=\"{{ modalText }}\" oninput=\"{{ onModalText }}\" placeholder=\"Nome do salto (ex.: Coda, Letra C)\" style=\"width: 100%; background: #0F1422; border: 1px solid #2C3447; color: #EEF1F8; padding: 12px 14px; border-radius: 10px; font-size: 14px; font-family: 'Montserrat', sans-serif; outline: none; margin-bottom: 12px;\">\n        <div style=\"display: flex; align-items: center; gap: 10px;\">\n          <span style=\"font-size: 13px; color: #9CA5B8; font-weight: 600;\">Pula para a página<\u002Fspan>\n          <input type=\"number\" min=\"1\" value=\"{{ modalPage }}\" oninput=\"{{ onModalPage }}\" style=\"width: 80px; background: #0F1422; border: 1px solid #2C3447; color: #EEF1F8; padding: 10px; border-radius: 9px; font-size: 14px; font-family: 'Montserrat', sans-serif; outline: none; text-align: center;\">\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ mIsAdd }}\" hint-placeholder-val=\"{{ false }}\">\n        <sc-if value=\"{{ hasPlaylists }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n            <sc-for list=\"{{ addList }}\" as=\"pl\" hint-placeholder-count=\"0\">\n              <button onclick=\"{{ pl.choose }}\" style=\"{{ pl.style }}\">{{ pl.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noPlaylists }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"font-size: 13.5px; color: #747E91; line-height: 1.5;\">Você ainda não tem playlists. Crie uma na tela inicial primeiro.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ modalHasConfirm }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display: flex; gap: 10px; margin-top: 20px;\">\n          <button onclick=\"{{ closeModal }}\" style=\"flex: 1; background: transparent; border: 1px solid #2C3447; color: #CFD6E5; padding: 11px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer;\">Cancelar<\u002Fbutton>\n          <button onclick=\"{{ confirmModal }}\" style=\"flex: 1; background: #E73B4C; border: none; color: #fff; padding: 11px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer;\">Salvar<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#E73B4C&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;defaultBpm&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:90,&quot;min&quot;:40,&quot;max&quot;:240,&quot;tsType&quot;:&quot;number&quot;},&quot;showZoneHints&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    view: 'library',\n    scores: [],\n    playlists: [],\n    markersMap: {},\n    recordingsMeta: [],\n    gestures: { tapLeft: 'prev', tapRight: 'next', swipeLeft: 'next', swipeRight: 'prev' },\n    activePlaylist: null,\n    currentScoreId: null,\n    currentPage: 1,\n    totalPages: 1,\n    fitMode: 'page',\n    chromeVisible: true,\n    autoscroll: false,\n    scrollSpeed: 45,\n    showMetro: false, showGestures: false, showRecordings: false,\n    metroOn: false, bpm: 90, beats: 4, metroVol: 0.85, accent: true, currentBeat: -1,\n    recording: false, recElapsed: 0, playingRec: null,\n    showModal: false, modalType: null, modalText: '', modalPage: 1, modalScoreId: null,\n  };\n\n  // ---------- lifecycle ----------\n  componentDidMount() {\n    this.loadAll();\n    this._docs = {};\n    this._jumpStack = [];\n    window.addEventListener('keydown', this.onKey);\n    window.addEventListener('resize', this.onResize);\n    this.waitPdf();\n  }\n  componentWillUnmount() {\n    window.removeEventListener('keydown', this.onKey);\n    window.removeEventListener('resize', this.onResize);\n    if (this._raf) cancelAnimationFrame(this._raf);\n    this.stopMetro();\n  }\n  componentDidUpdate() {\n    if (this.state.view === 'library') this.renderThumbs();\n    if (this.state.view === 'reader' && this._pdfReady) {\n      this.ensureViewerListeners();\n      const key = this.state.currentScoreId + '|' + this.state.fitMode;\n      if (this._viewer && this._builtKey !== key) this.buildViewer();\n    }\n  }\n\n  waitPdf() {\n    if (window.pdfjsLib) {\n      window.pdfjsLib.GlobalWorkerOptions.workerSrc = (window.__resources && window.__resources.pdfWorker) || 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';\n      this._pdfReady = true;\n      this.forceUpdate();\n      return;\n    }\n    setTimeout(() => this.waitPdf(), 60);\n  }\n  onResize = () => {\n    clearTimeout(this._rzT);\n    this._rzT = setTimeout(() => { this._builtKey = null; this.forceUpdate(); }, 250);\n  };\n\n  // ---------- persistence ----------\n  ls(k, def) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch (e) { return def; } }\n  save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} }\n  loadAll() {\n    this.setState({\n      scores: this.ls('sp.scores', []),\n      playlists: this.ls('sp.playlists', []),\n      markersMap: this.ls('sp.markers', {}),\n      recordingsMeta: this.ls('sp.recordings', []),\n      gestures: this.ls('sp.gestures', this.state.gestures),\n      bpm: this.ls('sp.bpm', this.props.defaultBpm || 90),\n      beats: this.ls('sp.beats', 4),\n      scrollSpeed: this.ls('sp.speed', 45),\n      fitMode: this.ls('sp.fit', 'page'),\n    });\n  }\n\n  // ---------- IndexedDB ----------\n  idb() {\n    if (this._dbP) return this._dbP;\n    this._dbP = new Promise((res, rej) => {\n      const r = indexedDB.open('partituras-db', 1);\n      r.onupgradeneeded = () => { const db = r.result; if (!db.objectStoreNames.contains('pdfs')) db.createObjectStore('pdfs'); if (!db.objectStoreNames.contains('recordings')) db.createObjectStore('recordings'); };\n      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);\n    });\n    return this._dbP;\n  }\n  async idbPut(s, k, v) { const db = await this.idb(); return new Promise((res, rej) => { const tx = db.transaction(s, 'readwrite'); tx.objectStore(s).put(v, k); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); }); }\n  async idbGet(s, k) { const db = await this.idb(); return new Promise((res, rej) => { const tx = db.transaction(s, 'readonly'); const rq = tx.objectStore(s).get(k); rq.onsuccess = () => res(rq.result); rq.onerror = () => rej(rq.error); }); }\n  async idbDel(s, k) { const db = await this.idb(); return new Promise((res, rej) => { const tx = db.transaction(s, 'readwrite'); tx.objectStore(s).delete(k); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); }); }\n\n  // ---------- import ----------\n  setFileRef = (el) => { this._fileInput = el; };\n  openFilePicker = () => { if (this._fileInput) this._fileInput.click(); };\n  onFilesChosen = async (e) => {\n    const files = Array.from(e.target.files || []);\n    e.target.value = '';\n    if (!this._pdfReady) { await new Promise(r => setTimeout(r, 400)); }\n    let scores = this.state.scores.slice();\n    for (const f of files) {\n      try {\n        const buf = await f.arrayBuffer();\n        const id = 'sc' + Date.now() + Math.floor(Math.random() * 1000);\n        await this.idbPut('pdfs', id, buf);\n        const doc = await window.pdfjsLib.getDocument({ data: new Uint8Array(buf.slice(0)) }).promise;\n        this._docs[id] = doc;\n        scores = [{ id, name: f.name.replace(/\\.pdf$/i, ''), pages: doc.numPages, addedAt: Date.now() }, ...scores];\n        this.setState({ scores });\n        this.save('sp.scores', scores);\n      } catch (err) { console.error('import', err); }\n    }\n  };\n\n  async getDoc(id) {\n    if (this._docs[id]) return this._docs[id];\n    const buf = await this.idbGet('pdfs', id);\n    if (!buf) throw new Error('pdf não encontrado');\n    const doc = await window.pdfjsLib.getDocument({ data: new Uint8Array(buf.slice(0)) }).promise;\n    this._docs[id] = doc;\n    return doc;\n  }\n\n  // ---------- thumbnails ----------\n  async renderThumbs() {\n    if (this._thumbRunning) return;\n    this._thumbRunning = true;\n    try {\n      const cans = Array.from(document.querySelectorAll('canvas[data-thumb]'));\n      for (const c of cans) {\n        const id = c.getAttribute('data-thumb'); if (c.dataset.drawn === id || !this._pdfReady) continue;\n        c.dataset.drawn = id;\n        try {\n          const doc = await this.getDoc(id);\n          const page = await doc.getPage(1);\n          const vp0 = page.getViewport({ scale: 1 });\n          const w = 300; const scale = w / vp0.width;\n          const vp = page.getViewport({ scale });\n          c.width = vp.width; c.height = vp.height;\n          await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;\n        } catch (err) { c.dataset.drawn = ''; }\n      }\n    } finally { this._thumbRunning = false; }\n  }\n\n  // ---------- library actions ----------\n  selectPlaylist(id) { this.setState({ activePlaylist: id }); }\n  deleteScore(id) {\n    const scores = this.state.scores.filter(s => s.id !== id);\n    const playlists = this.state.playlists.map(p => ({ ...p, items: p.items.filter(x => x !== id) }));\n    const markersMap = { ...this.state.markersMap }; delete markersMap[id];\n    this.setState({ scores, playlists, markersMap });\n    this.save('sp.scores', scores); this.save('sp.playlists', playlists); this.save('sp.markers', markersMap);\n    this.idbDel('pdfs', id); delete this._docs[id];\n  }\n  newPlaylist = () => { this.setSt
